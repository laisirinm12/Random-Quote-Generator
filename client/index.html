<!DOCTYPE html>
<html>

<head>
    <title>Random Quote Generator</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@700&family=Playfair+Display:wght@400;600&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>

    <div class="container">
        <h1 id="title" class="title">Quote Generator</h1>

        <div class="quote-card" id="quoteCard">

            <p id="quoteText"></p>
            <p id="quoteAuthor"></p>

            <div class="buttons" id="buttons">
                <button id="newQuote">New Quote</button>
                <button id="copyQuote">Copy</button>
                <button id="downloadQuote">Download</button>
            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
